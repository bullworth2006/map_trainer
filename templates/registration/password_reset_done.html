{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Письмо отправлено | Map Trainer</title>

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">

        <h2 class="auth-title">Письмо отправлено!</h2>

        <p class="auth-message">
            Если аккаунт с указанным адресом электронной почты существует,
            мы отправили письмо со ссылкой для сброса пароля.
        </p>

        <p class="auth-message">
            Проверьте входящие сообщения (а также папку <strong>«Спам»</strong>)
            и перейдите по ссылке из письма.
        </p>

        <a href="/accounts/login/" class="btn-auth-link">
            Вернуться ко входу
        </a>

    </div>
</div>

</body>
</html>
